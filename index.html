<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Savoria | Experience Fine Dining</title>

        <!-- DaisyUI Components -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

        <!-- Tailwind CDN -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- Vanila CSS -->
        <link rel="stylesheet" href="./styles/style.css">

        <!-- Fontawesome CDN -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
        <!-- All Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Italiana&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- Header Part -->
        <header>
            <!-- Nav-Bar -->
            <div class="nav-bar-bg sm:px-10 bg-white h-22 flex justify-center items-center border-b-1 border-b-gray-300 fixed top-0 w-full">
                <nav class="navbar flex justify-between container items-center">
                    <div class="nav-logo logo-font text-4xl text-[#963c00]">SAVORIA</div>
                    <ul class="nav-links font-bold text-md md:flex gap-8 sm:hidden">
                        <li><a class="hover:text-[#963c00]" href="#">Home</a></li>
                        <li><a class="hover:text-[#963c00]" href="#">About</a></li>
                        <li><a class="hover:text-[#963c00]" href="#">Menu</a></li>
                        <li><a class="hover:text-[#963c00]" href="#">Gallery</a></li>
                        <li><a class="hover:text-[#963c00]" href="#">Contact</a></li>
                    </ul>
                    <div class="reserve-btn sm:ml-65 md:ml-0"><button class="reservation-btn bg-[#963c00] text-white px-4 py-3 rounded-lg font-bold">Reserve Table</button></div>
                    
                    <!-- Hamburger Button -->
                    <label class="btn btn-circle swap swap-rotate grid place-items-center md:hidden">
                    <!-- this hidden checkbox controls the state -->
                        <input type="checkbox" />

                        <!-- hamburger icon -->
                        <svg
                            class="swap-off fill-current w-6 h-6"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 512 512">
                            <path d="M64,384H448V341.33H64Zm0-106.67H448V234.67H64ZM64,128v42.67H448V128Z" />
                        </svg>

                        <!-- close icon -->
                        <svg
                            class="swap-on fill-current w-6 h-6"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 512 512">
                            <polygon
                            points="400 145.49 366.51 112 256 222.51 145.49 112 112 145.49 222.51 256 112 366.51 145.49 400 256 289.49 366.51 400 400 366.51 289.49 256 400 145.49" />
                        </svg>
                    </label>
                </nav>
            </div>

            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-banner flex items-center justify-center sm:h-200 2xl:h-245 bg-[url(./assets/images/Hero-Banner.jpeg)] bg-black/60 bg-blend-darken bg-cover">
                    <div class="hero-container">
                        <h1 class="hero-heading hero-heading-font text-white text-center text-5xl md:text-6xl lg:text-7xl 2xl:text-8xl">Experience Fine Dining</h1>
                        <p class="hero-desc text-center text-white font-regular mt-5 lg:text-xl 2xl:text-2xl w-8/12 m-auto">Where culinary artistry meets exceptional service</p>
                        <div class="hero-btns mt-7 flex justify-center gap-5">
                            <button class="reservation-btn view-menu-btn bg-[#963c00] text-white px-4 py-3 rounded-md font-bold">View Menu</button>
                            <button class="reservation-btn view-menu-btn bg-[#ffffff] text-[#963c00] px-4 py-3 rounded-md font-bold">Make Reservation</button>
                        </div>
                    </div>
                </div>
            </section>
        </header>
        <main></main>
        <footer></footer>
    </body>
</html>
